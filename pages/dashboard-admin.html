<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayPerWin — Panel Admin</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/dashboard-admin.css" />
  <script>if(localStorage.getItem("ppw-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZPD4NZJQY2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZPD4NZJQY2');
  </script>
</head>
<body>

<div class="dashboard">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <a href="../index.html" class="sidebar__logo">Pay<span>PerWin</span></a>

    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar" style="background:var(--error)">AD</div>
      <div class="sidebar__user-info">
        <div class="sidebar__user-name">Administration</div>
        <div class="sidebar__user-role">
          <span class="sidebar__role-badge" style="background:var(--error-pale);color:var(--error)">Admin</span>
        </div>
      </div>
    </div>

    <nav class="sidebar__nav">
      <div class="sidebar__section-label">Tableau de bord</div>
      <button class="sidebar__link" data-page="overview" onclick="navigateTo('overview')">
        <span class="sidebar__link-icon">🏠</span> Vue d'ensemble
        <span class="sidebar__link-badge red" id="badge-urgent">3</span>
      </button>

      <div class="sidebar__section-label">Gestion</div>
      <button class="sidebar__link" data-page="pronos" onclick="navigateTo('pronos')">
        <span class="sidebar__link-icon">⏳</span> Valider résultats
        <span class="sidebar__link-badge" id="badge-pronos">4</span>
      </button>
      <button class="sidebar__link" data-page="tipsters" onclick="navigateTo('tipsters')">
        <span class="sidebar__link-icon">📊</span> Tipsters
      </button>
      <button class="sidebar__link" data-page="users" onclick="navigateTo('users')">
        <span class="sidebar__link-icon">👥</span> Utilisateurs
      </button>
      <button class="sidebar__link" data-page="virements" onclick="navigateTo('virements')">
        <span class="sidebar__link-icon">💸</span> Virements
        <span class="sidebar__link-badge" id="badge-vir">2</span>
      </button>
      <button class="sidebar__link" data-page="finances" onclick="navigateTo('finances')">
        <span class="sidebar__link-icon">💰</span> Finances
      </button>

      <button class="sidebar__link" data-page="images" onclick="navigateTo('images')">
        <span class="sidebar__link-icon">🖼️</span> Images pronos
        <span class="sidebar__link-badge" id="badge-images" style="display:none">0</span>
      </button>
      <button class="sidebar__link" data-page="sondage" onclick="navigateTo('sondage')">
        <span class="sidebar__link-icon">📊</span> Sondages
      </button>
      <button class="sidebar__link" data-page="dashsettings" onclick="navigateTo('dashsettings')">
        <span class="sidebar__link-icon">🎛️</span> Dashboard users
      </button>

      <button class="sidebar__link" data-page="explorer" onclick="navigateTo('explorer')">
        <span class="sidebar__link-icon">🔍</span> Explorer tipsters
      </button>

      <button class="sidebar__link" data-page="feedback" onclick="navigateTo('feedback')">
        <span class="sidebar__link-icon">💬</span> Feedback & Changelog
      </button>
    </nav>

    <div class="sidebar__bottom">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle-btn">
      <div class="theme-toggle__left">
        <span id="theme-icon">🌙</span>
        <span id="theme-label">Mode sombre</span>
      </div>
      <div class="theme-toggle__track" id="theme-track">
        <div class="theme-toggle__thumb"></div>
      </div>
    </button>
      <a href="#" onclick="logout()" class="sidebar__link" style="color:var(--error)">
        <span class="sidebar__link-icon">🚪</span> Se déconnecter
      </a>
    </div>
  </aside>

  <!-- ── CONTENU ── -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="burger-btn" onclick="toggleSidebar()" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar__title" id="topbar-title">Vue d'ensemble</div>
      </div>
      <div class="topbar__right">
        <div class="topbar__balance" style="background:var(--error-pale);color:var(--error);border-color:rgba(255,61,61,0.2);white-space:nowrap">
          🔐 Mode Admin
        </div>
      </div>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="page-content" id="page-content"></div>
  </div>

</div>

<!-- Modale fiche détaillée -->
<div id="fiche-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;overflow-y:auto;padding:16px;box-sizing:border-box" onclick="closeFicheModal(event)">
  <div id="fiche-modal" style="background:var(--white);border-radius:var(--radius-lg);max-width:700px;width:100%;margin:20px auto;padding:var(--space-xl);position:relative;box-sizing:border-box">
    <button onclick="closeFicheModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-muted)">✕</button>
    <div id="fiche-modal-content">Chargement...</div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/config.js"></script>
<script src="../js/dashboard-admin.js"></script>
</body>
</html>
